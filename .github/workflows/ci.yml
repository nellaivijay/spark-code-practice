name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check markdown files
        uses: avto-dev/markdown-lint@v1
        with:
          config: '.github/yamllint-config.yaml'
          ignore: 'node_modules'

      - name: Check YAML files
        uses: actionshub/yamllint@main
        with:
          config_file: '.github/yamllint-config.yaml'
          file_or_dir: .
          strict: true

  validate-docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yaml
        run: |
          docker compose config > /dev/null
          echo "Docker Compose configuration is valid"

  validate-kubernetes:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate Kubernetes manifests
        run: |
          if [ -d "k8s" ]; then
            for file in k8s/*.yaml; do
              if [ -f "$file" ]; then
                kubectl apply --dry-run=client -f "$file"
                echo "Validated $file"
              fi
            done
          else
            echo "No k8s directory found, skipping"
          fi

  check-links:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for broken links in Markdown files
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          check-modified-files-only: 'no'
          folder-path: './labs'
          file-extension: '.md'

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  test-scripts:
    name: Test Setup Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check script syntax
        run: |
          if [ -d "scripts" ]; then
            for script in scripts/*.sh; do
              if [ -f "$script" ]; then
                bash -n "$script"
                echo "Syntax check passed for $script"
              fi
            done
          else
            echo "No scripts directory found, skipping"
          fi

  validate-notebooks:
    name: Validate Jupyter Notebooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install nbformat jupyter nbqa black ruff

      - name: Validate notebooks
        run: |
          if [ -d "notebooks" ]; then
            for notebook in notebooks/*.ipynb; do
              if [ -f "$notebook" ]; then
                python -m nbformat --check "$notebook"
                echo "Validated $notebook"
              fi
            done
          else
            echo "No notebooks directory found, skipping"
          fi

      - name: Check notebook formatting with nbQA (black)
        run: |
          if [ -d "notebooks" ]; then
            nbqa black --check notebooks/ || true
          else
            echo "No notebooks directory found, skipping"
          fi

      - name: Check notebook linting with nbQA (ruff)
        run: |
          if [ -d "notebooks" ]; then
            nbqa ruff check notebooks/ || true
          else
            echo "No notebooks directory found, skipping"
          fi