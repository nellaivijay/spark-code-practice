version: '3.8'

services:
  # Spark Master
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    ports:
      - "8080:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master Port
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
    volumes:
      - ./data:/opt/spark/data
      - ./notebooks:/opt/spark/notebooks
      - ./solutions:/opt/spark/solutions
    networks:
      - spark-practice-network
    command: /opt/spark/sbin/start-master.sh

  # Spark Worker 1
  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./data:/opt/spark/data
      - ./notebooks:/opt/spark/notebooks
      - ./solutions:/opt/spark/solutions
    networks:
      - spark-practice-network
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077

  # Spark Worker 2
  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./data:/opt/spark/data
      - ./notebooks:/opt/spark/notebooks
      - ./solutions:/opt/spark/solutions
    networks:
      - spark-practice-network
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077

  # Jupyter Notebook with PySpark
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: spark-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=jupyter
      - PYSPARK_DRIVER_PYTHON_OPTS=lab
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./solutions:/home/jovyan/solutions
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    networks:
      - spark-practice-network
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: spark-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - spark-practice-network

  # PostgreSQL (for Hive Metastore)
  postgres:
    image: postgres:15
    container_name: spark-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=spark_metastore
      - POSTGRES_USER=spark
      - POSTGRES_PASSWORD=spark_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spark-practice-network

  # Hive Metastore
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: spark-hive-metastore
    ports:
      - "9083:9083"
    depends_on:
      - postgres
    environment:
      - SERVICE_URI=thrift://hive-metastore:9083
      - DB_DRIVER=org.postgresql.Driver
      - DB_CONNECTION_URL=jdbc:postgresql://postgres:5432/spark_metastore
      - DB_USER=spark
      - DB_PASSWORD=spark_password
    volumes:
      - ./config/hive:/opt/hive/conf
    networks:
      - spark-practice-network

networks:
  spark-practice-network:
    driver: bridge

volumes:
  postgres_data: